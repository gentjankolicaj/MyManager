#version of docker compose
version: '2'

networks:
  mysql_net:
    driver: bridge

services:
  mysql-service:
    image: mysql:8.0.28
    container_name: mysql-cont
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=P4ssw0rd
      - MYSQL_USER=admin
      - MYSQL_PASSWORD=P4ssw0rd
    networks:
      - mysql_net




